version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: wordlens_backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wordlens_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  db:
    image: postgres:13-alpine
    container_name: wordlens_db
    env_file: .env
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wordlens_redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: wordlens_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    mem_limit: 4g               
    env_file: .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/uploads:/app/app/uploads
    depends_on:
      - db
      - redis

volumes:
  db_data: